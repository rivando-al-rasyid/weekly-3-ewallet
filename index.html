<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Wallet Landing Page</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <style>
        body { font-family: 'Poppins', sans-serif; }
        </style>
    </head>
    <body class="bg-white text-gray-900">

        <nav class="flex items-center justify-between px-10 py-6 bg-[#2D46FF] text-white">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white/20 rounded flex items-center justify-center">
                    <span class="text-xs">💳</span>
                </div>
                <span class="text-xl font-semibold tracking-wide">E-Wallet</span>
            </div>
            <div class="flex gap-4">
                <button class="px-6 py-2 border border-white rounded-md hover:bg-white hover:text-[#2D46FF] transition">Sign In</button>
                <button class="px-6 py-2 bg-white text-[#2D46FF] rounded-md font-medium shadow-lg hover:bg-gray-100 transition">Sign Up</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-10 py-20 grid grid-cols-1 md:grid-cols-2 items-center gap-12">

            <section class="space-y-8">
                <h1 class="text-6xl font-bold leading-tight text-[#1A2138]">
                    Smart Way to Your <br> Financial Business
                </h1>
                <p class="text-gray-500 text-lg max-w-md">
                    We bring you a mobile app for banking problems that oftenly wasting much of your times.
                </p>

                <button class="px-10 py-4 bg-[#2D46FF] text-white rounded-md font-semibold shadow-xl hover:bg-blue-700 transition transform hover:-translate-y-1">
                    Get Started
                </button>

                <div class="pt-6">
                    <p class="text-sm text-gray-400 mb-4">Available on</p>
                    <div class="flex gap-6 items-center">
                        <svg
                            class="w-8 h-8 text-gray-400"
                            fill="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.61 3,21.09 3,20.5M16.81,15.12L18.81,13.97C20.21,13.16 20.21,10.83 18.81,10.03L16.81,8.88L14.4,11.29L16.81,15.12M14.4,11.29L4.54,1.43C4.7,1.38 4.87,1.35 5.05,1.35C5.45,1.35 5.84,1.49 6.19,1.69L15.4,7L14.4,11.29M14.4,12.71L15.4,17L6.19,22.31C5.84,22.51 5.45,22.65 5.05,22.65C4.87,22.65 4.7,22.62 4.54,22.57L14.4,12.71Z"/>
                        </svg>
                        <svg
                            class="w-8 h-8 text-gray-900"
                            fill="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path d="M18.71,19.5C17.88,20.74 17,21.95 15.66,21.97C14.32,22 13.89,21.18 12.37,21.18C10.84,21.18 10.37,21.95 9.1,22C7.79,22.05 6.8,20.68 5.96,19.47C4.25,17 2.94,12.45 4.7,9.39C5.57,7.87 7.13,6.91 8.82,6.88C10.1,6.86 11.32,7.75 12.11,7.75C12.89,7.75 14.37,6.68 15.92,6.84C16.57,6.87 18.39,7.1 19.56,8.82C19.47,8.88 17.39,10.1 17.41,12.63C17.44,15.65 20.06,16.66 20.09,16.67C20.06,16.74 19.67,18.11 18.71,19.5M13,3.5C13.73,2.63 14.21,1.45 14.07,0.26C13.05,0.3 11.81,0.94 11.08,1.81C10.42,2.56 9.85,3.77 10,4.94C11.13,5.03 12.28,4.37 13,3.5Z"/>
                        </svg>
                    </div>
                </div>
            </section>

            <div class="relative flex justify-center">
                <div class="relative w-full max-w-md">
                    <img
                        src="https://img.freepik.com/free-vector/contactless-payment-concept-illustration_114360-2342.jpg"
                        alt="3D Illustration"
                        class="w-full h-auto drop-shadow-2xl"
                    >
                </div>
            </div>
        </main>

        <footer class="bg-[#3D3D3D] py-12">
            <div class="max-w-7xl mx-auto px-10 flex flex-wrap justify-between items-center opacity-40 grayscale contrast-125">
                <span class="text-white text-2xl font-bold">Microsoft</span>
                <span class="text-white text-2xl font-bold italic">Dropbox</span>
                <span class="text-white text-3xl font-bold">H&M</span>
                <span class="text-white text-2xl font-semibold">airbnb</span>
                <span class="text-white text-2xl font-serif">Canon</span>
                <span class="text-white text-2xl border-2 border-white rounded-full px-3">DELL</span>
            </div>
        </footer>

    </body>
</html>
