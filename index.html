<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Modern CSS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flat-ui/2.3.0/css/flat-ui.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="login-wrapper">

        <section class="login-content">
            <div class="login-container">
                <header>
                  <p class='brand'>E-Wallet</p>
                    <strong>Start Accessing Banking Needs With All Devices and All Platforms With 30.000+ Users</strong>
                    <p>Transfering money is eassier than ever, you can access Zwallet wherever you are. Desktop, laptop, mobile phone? we cover all of that for you! </p>
                </header>
<div class="social-auth">
                    <button class="btn-social btn-google">
                        <i class="  "></i>
                        Sign In With Google
                    </button>
                   <button class="btn-social btn-facebook">
                        <i class="fui-facebook"></i>
                        Sign In With Facebook
                    </button>
                </div>

                <div class="divider">
                    <span>Or</span>
                </div>
                                <form action="#" method="post" class="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="email" placeholder="your-email@gmail.com" id="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" placeholder="Your Password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" placeholder="Confirm Password" id="confirm" required>
                    </div>
                    <button type="submit" class="btn-login">Log In</button>
                    <div>Have An Account? <span class='brand'>Login</span></div>
                </form>
            </div>
        </section>
                <aside class="login-bg" aria-hidden="true">
                </aside>

    </main>

</body>
</html>
