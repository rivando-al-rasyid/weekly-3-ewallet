<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Wallet - Profile</title>
        <link rel="stylesheet" href="css/dashboard.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Nunito+Sans:wght@600&display=swap" rel="stylesheet">
        <style>
        /* Specific tweaks for the Profile Layout */
        .profile-picture-section {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 8px;
        }

        .pp-preview {
            width: 100px;
            height: 100px;
            background: #F7F8FC;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .pp-preview svg {
            width: 40px;
            height: 40px;
            color: #b0b8d4;
        }

        .pp-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-outline-danger {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-outline-danger:hover {
            background: #fff5f5;
        }

        .link-action {
            display: block;
            font-size: 14px;
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
            margin-top: 8px;
            transition: color 0.2s;
        }

        .link-action:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }
        </style>
    </head>
    <body>

        <header>
            <a href="#" class="logo">
                <div class="logo-icon">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="white"
                        stroke-width="2"
                    >
                        <rect
                            x="2"
                            y="5"
                            width="20"
                            height="14"
                            rx="2"
                        />
                        <line
                            x1="2"
                            y1="10"
                            x2="22"
                            y2="10"
                        />
                    </svg>
                </div>
                <span class="logo-text">E-Wallet</span>
            </a>
            <div class="header-right">
                <span class="header-name">Ghaluh Wizard</span>
                <div class="user-dropdown">
                    <div class="user-dropdown-trigger">
                        <div class="avatar">
                            <img src="https://via.placeholder.com/44" alt="User">
                        </div>
                        <div class="chevron-down">
                            <svg
                                width="16"
                                height="16"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M6 9l6 6 6-6"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <nav class="sidenav">
            <div class="sidenav-items">
                <a href="#" class="nav-item">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <rect
                            x="3"
                            y="3"
                            width="7"
                            height="7"
                        />
                        <rect
                            x="14"
                            y="3"
                            width="7"
                            height="7"
                        />
                        <rect
                            x="14"
                            y="14"
                            width="7"
                            height="7"
                        />
                        <rect
                            x="3"
                            y="14"
                            width="7"
                            height="7"
                        />
                    </svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                    Transfer
                </a>
                <a href="#" class="nav-item">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <circle
                            cx="12"
                            cy="12"
                            r="10"
                        />
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    History
                </a>
                <a href="#" class="nav-item">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Top Up
                </a>
                <a href="#" class="nav-item active">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle
                            cx="12"
                            cy="7"
                            r="4"
                        />
                    </svg>
                    Profile
                </a>
            </div>
            <div class="nav-logout">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
                Keluar
            </div>
        </nav>

        <main>
            <div class="page-header">
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle
                        cx="12"
                        cy="7"
                        r="4"
                    />
                </svg>
                <h1 class="page-title">Profile</h1>
            </div>

            <section class="transfer-section" style="max-width: 900px;">
                <div class="field-block">
                    <label class="field-label">Profile Picture</label>
                    <div class="profile-picture-section">
                        <div class="pp-preview">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle
                                    cx="12"
                                    cy="7"
                                    r="4"
                                />
                            </svg>
                        </div>
                        <div class="pp-actions">
                            <button class="btn btn-primary">
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                Change Profile
                            </button>
                            <button class="btn btn-outline-danger">
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                    <line
                                        x1="10"
                                        y1="11"
                                        x2="10"
                                        y2="17"
                                    />
                                    <line
                                        x1="14"
                                        y1="11"
                                        x2="14"
                                        y2="17"
                                    />
                                </svg>
                                Delete Profile
                            </button>
                        </div>
                    </div>
                    <p class="field-sub">The profile picture must be 512 x 512 pixels or less</p>
                </div>

                <div class="field-block">
                    <label class="field-label">Full Name</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg
                                width="18"
                                height="18"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle
                                    cx="12"
                                    cy="7"
                                    r="4"
                                />
                            </svg>
                        </span>
                        <input type="text" placeholder="Enter Full Name">
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Phone</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg
                                width="18"
                                height="18"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                            </svg>
                        </span>
                        <input type="text" placeholder="Enter Your Number Phone">
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Email</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg
                                width="18"
                                height="18"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" placeholder="Enter Your Email">
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Password</label>
                    <a href="#" class="link-action">Change Password</a>
                </div>

                <div class="field-block" style="margin-bottom: 32px;">
                    <label class="field-label">Pin</label>
                    <a href="#" class="link-action">Change Pin</a>
                </div>

                <button class="submit-btn">Submit</button>
            </section>
        </main>

    </body>
</html>
