<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Modern CSS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flat-ui/2.3.0/css/flat-ui.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="reset-wrapper">

        <section class="login-content">
            <div class="login-container">
                <header>
                  <p class='brand'> <img src="assets/wallet.png" height='20' alt="">  E-Wallet</p>
                    <strong>Fill Out Form Correctly 👋</strong>
                    <p>We will send new password to your email </p>
                </header>
                                <form action="#" method="post" class="login-form">
                    <div class="form-group">
                        <label for="username">Email</label>
                        <input type="email" placeholder="Enter Your Email" id="username" required>
                    </div>

                    <button type="submit" class="btn-login">Submit</button>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
