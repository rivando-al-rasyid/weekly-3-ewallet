<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Modern CSS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flat-ui/2.3.0/css/flat-ui.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="login-wrapper">

        <section class="login-content">
            <div class="login-container">
                <header>
                  <p class='brand'> <img src="assets/wallet.png" height='20' alt="">  E-Wallet</p>
                    <strong>Enter Your Pin 👋</strong>
                    <p>Please save your pin because this so important.. </p>
                </header>
                                <form action="#" method="post" class="login-form">
                    <div class="form-group">
                        <label for="username">Email</label>
                        <input type="email" placeholder="Enter Your Email" id="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" placeholder="Enter Your Password" id="password" required>
                    </div>
                    <button type="submit" class="btn-login">Log In</button>
                    <div class='center'>Forgot Your Pin? <span class='brand'>Reset</span></div>
                </form>
            </div>
        </section>
                <aside class="login-bg" aria-hidden="true">
                </aside>

    </main>

</body>
</html>
