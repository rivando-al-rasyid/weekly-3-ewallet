<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Enter PIN | E-Wallet</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="pin-wrapper">

        <section class="login-content">
            <div class="login-container">
                <header>
                    <p class="brand">
                        <img src="assets/wallet.png" height="20" alt="E-Wallet logo">
                        E-Wallet
                    </p>
                    <strong>Enter Your PIN 🔐</strong>
                    <p>Please enter your 6-digit PIN to continue. Keep your PIN safe and private.</p>
                </header>

                <form action="#" method="post" class="login-form">
                    <div class="pin-input-group">
                        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                        <input type="text" maxlength="1" placeholder="_" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
                    </div>

                    <button type="submit" class="btn-login">Submit</button>
                    <div class="center">
                        Forgot Your PIN? <a href="reset.html" class="brand" style="font-size:0.875rem;">Reset</a>
                    </div>
                </form>
            </div>
        </section>

        <aside class="pin-bg" aria-hidden="true"></aside>

    </main>


</body>
</html>
