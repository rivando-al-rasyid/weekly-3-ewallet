                    <h2 class="modal-success-heading" style="font-size: 18px;">Change Pin 👋</h2>
                    <p class="modal-success-sub">Please save your pin because this so important.</p>

                    <form id="pinForm">
                        <div class="pin-input-group">
                            <input
                                type="text"
                                maxlength="1"
                                inputmode="numeric"
                                placeholder=" "
                                required
                                autofocus
                            >
                            <input

        </main>

        <script>
        const inputs = document.querySelectorAll('.pin-input-group input');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Filter non-numeric characters
                input.value = input.value.replace(/[^0-9]/g, '');

                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                // Backspace logic to return to previous input
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Auto-select text on focus for easier correction
            input.addEventListener('focus', () => input.select());
        });
        </script>
