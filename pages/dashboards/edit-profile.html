<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Wallet - Profile</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Nunito+Sans:wght@600&display=swap" rel="stylesheet">
        <link href="../../css/dashboard.css" rel="stylesheet">
        <style>
        .profile-picture-section {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 8px;
        }

        .pp-preview {
            width: 100px;
            height: 100px;
            background: var(--bg-inner);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .pp-preview svg {
            width: 40px;
            height: 40px;
            color: #b0b8d4;
        }

        .pp-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-outline-danger {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 9px 18px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-outline-danger:hover { background: #fff5f5; }
        .btn-outline-danger svg { width: 16px; height: 16px; flex-shrink: 0; }

        .link-action {
            display: block;
            font-size: 14px;
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
            margin-top: 8px;
            transition: color 0.2s;
        }

        .link-action:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }
        </style>
    </head>
    <body>

        <!-- HEADER -->
        <header>
            <a class="logo" href="./index.html">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <path d="M16 12h2"/>
                        <path d="M2 10h20"/>
                    </svg>
                </div>
                <span class="logo-text">E-Wallet</span>
            </a>
            <div class="header-right">
                <span class="header-name">Halo, Budi Santoso</span>
                <div class="user-dropdown" id="userDropdown">
                    <div class="user-dropdown-trigger">
                        <div class="avatar">BS</div>
                        <div class="chevron-down" id="userChevron">
                            <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                                <path d="M1 1L7 7L13 1" stroke="#4F5665" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                    </div>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <a class="dropdown-item" href="./edit-profile.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Profile
                        </a>
                        <a class="dropdown-item dropdown-item-danger" href="#">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            Keluar
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- SIDENAV -->
        <nav class="sidenav">
            <div class="sidenav-items">
                <a class="nav-item" href="./index.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    Dashboard
                </a>
                <a class="nav-item" href="./transfer.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                    </svg>
                    Transfer
                </a>
                <a class="nav-item" href="./history.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    History
                </a>
                <a class="nav-item" href="./topup.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 19V5M5 12l7-7 7 7"/>
                    </svg>
                    Top Up
                </a>
                <a class="nav-item active" href="./edit-profile.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Profile
                </a>
            </div>
            <div>
                <div class="nav-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Keluar
                </div>
            </div>
        </nav>

        <main class="dashboard">
          <div class="left-col" style="grid-column: 1 / -1;">
            <div class="page-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <h1 class="page-title">Profile</h1>
            </div>

            <section class="transfer-section" style="max-width: 900px;">
                <div class="field-block">
                    <label class="field-label">Profile Picture</label>
                    <div class="profile-picture-section">
                        <div class="pp-preview">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="pp-actions">
                            <button class="btn btn-primary">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                Change Profile
                            </button>
                            <button class="btn btn-outline-danger">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                </svg>
                                Delete Profile
                            </button>
                        </div>
                    </div>
                    <p class="field-sub">The profile picture must be 512 x 512 pixels or less</p>
                </div>

                <div class="field-block">
                    <label class="field-label">Full Name</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" placeholder="Enter Full Name">
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Phone</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
                            </svg>
                        </span>
                        <input type="text" placeholder="Enter Your Phone Number">
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Email</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" placeholder="Enter Your Email">
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Password</label>
                    <a href="./change-password.html" class="link-action">Change Password</a>
                </div>

                <div class="field-block" style="margin-bottom: 32px;">
                    <label class="field-label">PIN</label>
                    <a href="./change-pin.html" class="link-action">Change PIN</a>
                </div>

                <button class="submit-btn">Submit</button>
            </section>
          </div><!-- /.left-col -->
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <a class="bottom-nav-item" href="./index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                Dashboard
            </a>
            <a class="bottom-nav-item" href="./transfer.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 2L11 13"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
                Transfer
            </a>
            <a class="bottom-nav-item" href="./history.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                History
            </a>
            <a class="bottom-nav-item" href="./topup.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
                Top Up
            </a>
            <a class="bottom-nav-item active" href="./edit-profile.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Profile
            </a>
        </nav>

        <script>
            const dropdown = document.getElementById('userDropdown');
            const menu = document.getElementById('userDropdownMenu');
            const chevron = document.getElementById('userChevron');
            if (dropdown) {
                dropdown.addEventListener('click', () => {
                    menu.classList.toggle('open');
                    chevron.style.transform = menu.classList.contains('open') ? 'rotate(180deg)' : '';
                });
                document.addEventListener('click', (e) => {
                    if (!dropdown.contains(e.target)) menu.classList.remove('open');
                });
            }
        </script>

    </body>
</html>
