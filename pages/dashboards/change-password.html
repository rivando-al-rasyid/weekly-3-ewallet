<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>E-Wallet - Change Password</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Nunito+Sans:wght@600&display=swap" rel="stylesheet">
        <link href="../../css/dashboard.css" rel="stylesheet">
        <style>
        .password-toggle {
            cursor: pointer;
            color: #b0b8d4;
            display: flex;
            align-items: center;
            padding-right: 4px;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: var(--blue); }
        .password-toggle svg { width: 18px; height: 18px; }
        </style>
    </head>
    <body>

        <!-- HEADER -->
        <header>
            <a class="logo" href="./index.html">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <path d="M16 12h2"/>
                        <path d="M2 10h20"/>
                    </svg>
                </div>
                <span class="logo-text">E-Wallet</span>
            </a>
            <div class="header-right">
                <span class="header-name">Halo, Budi Santoso</span>
                <div class="user-dropdown" id="userDropdown">
                    <div class="user-dropdown-trigger">
                        <div class="avatar">BS</div>
                        <div class="chevron-down" id="userChevron">
                            <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                                <path d="M1 1L7 7L13 1" stroke="#4F5665" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                    </div>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <a class="dropdown-item" href="./edit-profile.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Profile
                        </a>
                        <a class="dropdown-item dropdown-item-danger" href="#">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                                <polyline points="16 17 21 12 16 7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            Keluar
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- SIDENAV -->
        <nav class="sidenav">
            <div class="sidenav-items">
                <a class="nav-item" href="./index.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    Dashboard
                </a>
                <a class="nav-item" href="./transfer.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                    </svg>
                    Transfer
                </a>
                <a class="nav-item" href="./history.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    History
                </a>
                <a class="nav-item" href="./topup.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 19V5M5 12l7-7 7 7"/>
                    </svg>
                    Top Up
                </a>
                <a class="nav-item active" href="./edit-profile.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Profile
                </a>
            </div>
            <div>
                <div class="nav-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Keluar
                </div>
            </div>
        </nav>

        <main class="dashboard">
          <div class="left-col" style="grid-column: 1 / -1;">
            <div class="page-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <h1 class="page-title">Profile</h1>
            </div>

            <section class="transfer-section" style="max-width: 600px;">
                <h2 class="section-title">Change Password</h2>

                <div class="field-block">
                    <label class="field-label">Existing Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="pw1" placeholder="Enter Your Existing Password">
                        <div class="password-toggle" onclick="togglePw('pw1', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">New Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="pw2" placeholder="Enter Your New Password">
                        <div class="password-toggle" onclick="togglePw('pw2', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="field-block">
                    <label class="field-label">Confirm New Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="pw3" placeholder="Re-Type Your New Password">
                        <div class="password-toggle" onclick="togglePw('pw3', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <button class="submit-btn">Submit</button>
            </section>
          </div><!-- /.left-col -->
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <a class="bottom-nav-item" href="./index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                Dashboard
            </a>
            <a class="bottom-nav-item" href="./transfer.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 2L11 13"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
                Transfer
            </a>
            <a class="bottom-nav-item" href="./history.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                History
            </a>
            <a class="bottom-nav-item" href="./topup.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
                Top Up
            </a>
            <a class="bottom-nav-item active" href="./edit-profile.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                Profile
            </a>
        </nav>

        <script>
            function togglePw(id, btn) {
                const input = document.getElementById(id);
                input.type = input.type === 'password' ? 'text' : 'password';
                btn.style.color = input.type === 'text' ? 'var(--blue)' : '#b0b8d4';
            }

            const dropdown = document.getElementById('userDropdown');
            const menu = document.getElementById('userDropdownMenu');
            const chevron = document.getElementById('userChevron');
            if (dropdown) {
                dropdown.addEventListener('click', () => {
                    menu.classList.toggle('open');
                    chevron.style.transform = menu.classList.contains('open') ? 'rotate(180deg)' : '';
                });
                document.addEventListener('click', (e) => {
                    if (!dropdown.contains(e.target)) menu.classList.remove('open');
                });
            }
        </script>

    </body>
</html>
